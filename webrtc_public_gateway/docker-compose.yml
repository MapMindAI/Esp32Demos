services:
  janus:
    image: ${JANUS_IMAGE:-canyan/janus-gateway:latest}
    container_name: janus-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./janus/janus.transport.http.jcfg:/usr/local/etc/janus/janus.transport.http.jcfg:ro
      - ./janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
      - ./janus/janus.plugin.videoroom.jcfg:/usr/local/etc/janus/janus.plugin.videoroom.jcfg:ro
    # Host networking avoids Docker bridge ICE candidates (172.18.x.x).
    # Janus listens directly on host interfaces and media ports.

  caddy:
    image: caddy:2
    container_name: webrtc-edge
    restart: unless-stopped
    network_mode: host
    depends_on:
      - janus
    env_file:
      - .env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config

  slam-server:
    build:
      context: ./slam_server
    container_name: slam-server
    restart: unless-stopped
    network_mode: host
    environment:
      - SLAM_VOCAB_PATH=${SLAM_VOCAB_PATH:-/opt/orbslam/Vocabulary/ORBvoc.txt}
      - SLAM_SETTINGS_PATH=${SLAM_SETTINGS_PATH:-/opt/orbslam/config/monocular.yaml}
      - SLAM_SENSOR=${SLAM_SENSOR:-MONOCULAR}
      - SLAM_MAX_TRAJECTORY_POINTS=${SLAM_MAX_TRAJECTORY_POINTS:-3000}
      - SLAM_MAP_SAMPLE_STRIDE=${SLAM_MAP_SAMPLE_STRIDE:-4}
      - SLAM_MAX_MAP_POINTS=${SLAM_MAX_MAP_POINTS:-4000}
    volumes:
      - ${SLAM_DATA_DIR:-./slam_data}:/opt/orbslam:ro

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    user: "0:0"
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/mosquitto/config/init.sh"]
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/init.sh:/mosquitto/config/init.sh:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  caddy_data:
  caddy_config:
  mosquitto_data:
  mosquitto_log:
