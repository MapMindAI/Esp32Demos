<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>ESP32 Doorbell Control Panel</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: #0f172a; color: #e2e8f0; }
    .card { max-width: 980px; margin: 0 auto; background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    input, button { padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0b1220; color: #e2e8f0; }
    button { cursor: pointer; background: #1d4ed8; border-color: #1d4ed8; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .video-shell { width: 100%; aspect-ratio: 16 / 9; max-height: 70vh; background: black; border-radius: 8px; overflow: hidden; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; background: black; }
    #status { color: #93c5fd; min-height: 20px; margin-top: 10px; }
    .hint { color: #94a3b8; font-size: 13px; }
    .section-title { margin: 12px 0 8px; font-size: 16px; font-weight: 600; }
    .hidden { display: none !important; }
    details { border: 1px solid #334155; border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; }
    summary { cursor: pointer; color: #cbd5e1; }
    .overlay-controls { position: absolute; left: 0; right: 0; bottom: 12px; z-index: 3; pointer-events: none; }
    .control-panel { position: absolute; pointer-events: auto; }
    .control-panel.left { left: 12px; bottom: 0; }
    .control-panel.right { right: 12px; bottom: 0; }
    .control-panel .section-title, .control-panel .hint { display: none; }
    @media (max-width: 900px) {
      .control-panel.left { left: 8px; bottom: 0; }
      .control-panel.right { right: 8px; bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>ESP32 Doorbell Control Panel</h2>
    <div class="video-shell">
      <video id="remoteVideo" autoplay playsinline controls width="1920" height="1080"></video>
      <div class="overlay-controls">
        <div class="control-panel left">
          <div class="section-title">Robot Control</div>
          <div class="hint" style="margin-bottom:8px;">Press and hold to move, release to stop.</div>
          <div style="display:grid;grid-template-columns:72px 72px 72px;grid-template-rows:48px 48px 48px;gap:8px;justify-content:start;align-items:center;">
            <span></span>
            <button id="robotUpBtn" disabled>Up</button>
            <span></span>
            <button id="robotLeftBtn" disabled>Left</button>
            <button id="robotStopBtn" disabled>Stop</button>
            <button id="robotRightBtn" disabled>Right</button>
            <span></span>
            <button id="robotDownBtn" disabled>Down</button>
            <span></span>
          </div>
        </div>

        <div class="control-panel right">
          <div class="section-title">Camera Servo Control</div>
          <div class="hint" style="margin-bottom:8px;">Press and hold to pan/tilt, release to stop.</div>
          <div style="display:grid;grid-template-columns:72px 72px 72px;grid-template-rows:48px 48px 48px;gap:8px;justify-content:start;align-items:center;">
            <span></span>
            <button id="servoUpBtn" disabled>Up</button>
            <span></span>
            <button id="servoLeftBtn" disabled>Left</button>
            <button id="servoStopBtn" disabled>Stop</button>
            <button id="servoRightBtn" disabled>Right</button>
            <span></span>
            <button id="servoDownBtn" disabled>Down</button>
            <span></span>
          </div>
        </div>
      </div>
    </div>
    <div id="status">Idle</div>
    <p class="hint">WebRTC is controlled automatically by MQTT open/heartbeat/close commands.</p>

    <div class="section-title">MQTT Control</div>
    <div class="row">
      <input id="roomId" placeholder="Room ID" value="1234" />
      <input id="roomPin" placeholder="Room PIN" />
      <button id="mqttConnectBtn">MQTT Connect</button>
      <button id="mqttDisconnectBtn" disabled>MQTT Disconnect</button>
    </div>
    <div class="row">
      <input id="mqttCmdInput" placeholder="Send command string to ESP32" style="flex:1; min-width: 260px;" />
      <button id="mqttSendBtn" disabled>Send MQTT Cmd</button>
    </div>
    <details>
      <summary>Advanced Options</summary>
      <div class="row" style="margin-top:10px;">
        <input id="mqttWsUrl" placeholder="MQTT WS URL" style="min-width:260px;" />
        <input id="mqttUsername" placeholder="MQTT username (default = Room ID)" />
        <input id="mqttPassword" placeholder="MQTT password (default = Room PIN)" />
      </div>
      <div class="row">
        <input id="mqttMemTopic" placeholder="Memory topic (default = ROOM_ID/memory)" />
        <input id="mqttCmdTopic" placeholder="Command topic (default = ROOM_ID/command)" />
      </div>
      <div class="row">
        <input id="token" placeholder="Janus Token (optional)" />
        <input id="apiSecret" placeholder="Janus API Secret (if enabled)" />
        <button id="connectBtn">WebRTC Connect</button>
        <button id="disconnectBtn" disabled>WebRTC Disconnect</button>
      </div>
    </details>

    <div id="mqttStatus" class="hint">MQTT: disconnected</div>
    <pre id="mqttLog" style="background:#0b1220;border:1px solid #334155;border-radius:8px;padding:10px;max-height:180px;overflow:auto;"></pre>
  </div>

  <script src="/vendor/adapter.js"></script>
  <script src="/vendor/janus.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
